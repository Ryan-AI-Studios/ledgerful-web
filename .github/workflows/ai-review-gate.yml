name: AI Review Gate

# Enforces the AI-code adversarial review protocol.
# On PR open/synchronize, creates a `pending` status check for `ai-reviewed`.
# The orchestrator pushes `success` via `gh api` after an independent
# adversarial review reports no blocking findings.
# Branch protection requires this check before merge.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  statuses: write
  contents: read

jobs:
  pending-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Create pending ai-reviewed status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          curl -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/statuses/$PR_HEAD_SHA" \
            -d '{"state":"pending","context":"ai-reviewed","description":"AI-code adversarial review pending — orchestrator sets success after cross-model review passes","target_url":"https://github.com/Ryan-AI-Studios/ledgerful-web/blob/main/.github/AI-CODE-REVIEW-PROTOCOL.md"}'